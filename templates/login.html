{% extends "base.html" %}
{% block title %}Log In — MindJournal{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">🧠</div>
    <h1>Welcome back</h1>
    <p class="auth-sub">Your journal is waiting for you.</p>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Your password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Log in</button>
    </form>
    <p class="auth-switch">Don't have an account? <a href="{{ url_for('signup') }}">Sign up free</a></p>
  </div>
</div>
{% endblock %}
