{% extends "base.html" %}
{% block title %}Sign Up — MindJournal{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">🧠</div>
    <h1>Create your journal</h1>
    <p class="auth-sub">Free, private, and just for you.</p>
    <form method="POST" class="auth-form">
      <div class="form-group">
        <label for="name">Your name</label>
        <input type="text" id="name" name="name" placeholder="e.g. Alex" required autocomplete="name">
      </div>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password <span class="form-hint">(at least 6 characters)</span></label>
        <input type="password" id="password" name="password" placeholder="Choose a password" required autocomplete="new-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create my journal</button>
    </form>
    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
  </div>
</div>
{% endblock %}
